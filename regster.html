<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access | Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50">

<Header>
        <nav class="fixed top-0 w-full bg-gray-200 shadow-md text-gray-800 transition duration-300 hover:scale-105">
            <div class="flex justify-between items-center p-10">
                <a href="index.html"class="text-3xl text-indigo-60 font-bold transition duration-300 hover:scale-102">ACCESS</a>
                <div class="flex items-center gap-6 text-xl">
                    <a href="careers.html" class=" font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Careers</a>
                    <a href="quiz.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Quiz</a>
                    <a href="dashboard.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Dashboard</a>
                    <a href="opportunity.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Opportunities</a>
                    <a href="dashboard.html" class="text-2xl hover:scale-120 transition duration-200">👤</a>
                </div>
            </div>
        </nav>

    </Header>
<main>
<section class="pt-36">
    <div class="max-w-md mx-auto bg-white shadow-lg rounded-xl p-8">
        <h1 class="text-3xl font-bold text-center mb-8">Create Account</h1>

        <form id="register-form" class="space-y-5">
            <div>
                <label class="block mb-2 font-medium">Full Name</label>
                <input type="text" id="full-name" class="w-full border rounded-lg px-4 py-3" placeholder="Dictator Vitalis" required>
            </div>

            <div>
                <label class="block mb-2 font-medium">Email</label>
                <input type="email" id="email" class="w-full border rounded-lg px-4 py-3" placeholder="gmail@vitalis.com" required>
            </div>

            <div>
                <label class="block mb-2 font-medium">Password</label>
                <input type="password" id="password" class="w-full border rounded-lg px-4 py-3" placeholder="Create a password" required>
            </div>

            <div>
                <label class="block mb-2 font-medium">Confirm Password</label>
                <input type="password" id="confirm-password" class="w-full border rounded-lg px-4 py-3" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition">
                Register
            </button>
        </form>

        <p class="text-center mt-6">
            Already have an account?
            <a href="login.html" class="text-indigo-600 font-semibold">Login</a>
        </p>
    </div>
</section>
</main>
<footer class="bg-gray-900 text-white py-8">
        <div class="text-center">
            <h2 class="text-2xl font-bold">ACCESS</h2>
            <p class="mt-3 text-gray-400">Helping students make informed career decisions.</p>
            <p class="mt-5 text-gray-500">© 2026 Access. All rights reserved.</p>
        </div>
</footer>

<script src="js/auth.js"></script>

</body>
</html>

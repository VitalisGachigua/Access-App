<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <Header>
        <nav class="fixed top-0 w-full bg-gray-200 shadow-md text-gray-800 transition duration-300 hover:scale-105">
            <div class="flex justify-between items-center p-10">
                <a href="index.html"class="text-3xl text-indigo-60 font-bold transition duration-300 hover:scale-102">ACCESS</a>
                <div class="flex items-center gap-6 text-xl">
                    <a href="careers.html" class=" font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Careers</a>
                    <a href="quiz.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Quiz</a>
                    <a href="dashboard.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Dashboard</a>
                    <a href="opportunity.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Opportunities</a>
                    <a href="dashboard.html" class="text-2xl hover:scale-120 transition duration-200">👤</a>
                </div>
            </div>
        </nav>

    </Header>
    <main>
<section class="pt-36 pb-16 px-8">

    <div class="max-w-6xl mx-auto">

        <h1 class="text-5xl font-bold text-gray-800 mb-2"> Dashboard</h1>

        <p id="welcome-message" class="text-lg text-gray-600 mb-10">Welcome</p>

        <div class="grid md:grid-cols-2 gap-8">

            <div class="bg-white rounded-xl shadow-md p-6">

                <h2 class="text-2xl font-bold text-indigo-600 mb-4">Latest Quiz Result</h2>

                <p id="quiz-result" class="text-gray-700 text-lg">No quiz taken yet.</p>

            </div>

            <div class="bg-white rounded-xl shadow-md p-6">

                <h2 class="text-2xl font-bold text-indigo-600 mb-4">Saved Careers</h2>

                <div id="saved-careers" class="space-y-3">

                    <p class="text-gray-500">No saved careers.</p>

                </div>

            </div>

        </div>

        <div class="grid md:grid-cols-2 gap-8 mt-8">

            <div class="bg-white rounded-xl shadow-md p-6">

                <h2 class="text-2xl font-bold text-indigo-600 mb-4">Saved Opportunities</h2>

                <div id="saved-opportunities" class="space-y-3">

                    <p class="text-gray-500">No saved opportunities.</p>

                </div>

            </div>

            <div class="bg-white rounded-xl shadow-md p-6 flex flex-col justify-between">

                <div>

                    <h2 class="text-2xl font-bold text-indigo-600 mb-4">Account</h2>

                    <p id="user-email" class="text-gray-700 mb-2"></p>

                </div>

                <button id="logout-btn"class="mt-8 bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 transition">Logout</button>

            </div>

        </div>

    </div>

</section>
</main>
 <footer class="bg-gray-900 text-white py-8">
        <div class="text-center">
            <h2 class="text-2xl font-bold">ACCESS</h2>
            <p class="mt-3 text-gray-400">Helping students make informed career decisions.</p>
            <p class="mt-5 text-gray-500">© 2026 Access. All rights reserved.</p>
        </div>
</footer>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>

<script src="js/dashboard.js"></script>

</body>
</html>

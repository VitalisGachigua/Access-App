<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <nav class="fixed top-0 w-full bg-gray-200 shadow-md text-gray-800 transition duration-300 hover:scale-105">
            <div class="flex justify-between items-center p-10">
                <a href="index.html"class="text-3xl text-indigo-60 font-bold transition duration-300 hover:scale-102">ACCESS</a>
                <div class="flex items-center gap-6 text-xl">

            <a href="index.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">
                Home
            </a>

            <a href="careers.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">
                Careers
            </a>

            <a href="opportunities.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">
                Opportunities
            </a>

            <button
                id="logout-btn"
                class="bg-red-600 text-white px-5 py-2 rounded-lg hover:bg-red-700 transition duration-300 hover:scale-120">

                Logout

            </button>

        </div>

    </div>
</nav>

<section class="pt-32 pb-16 px-8">

    <div class="max-w-7xl mx-auto">

        <div class="text-center mb-12 pt-20">

            <h1 class="text-5xl font-bold text-gray-800">

                Admin Dashboard

            </h1>

            <p
                id="welcome-message"
                class="text-lg text-gray-600 mt-4">

                Welcome Admin

            </p>

        </div>

        <div class="grid md:grid-cols-3 gap-8">

            <div class="bg-white rounded-xl shadow-md p-8 text-center">

                <h2 class="text-lg font-semibold text-gray-500">
                    Registered Users
                </h2>

                <p
                    id="total-users"
                    class="text-5xl font-bold text-indigo-600 mt-4">

                    0

                </p>

            </div>

            <div class="bg-white rounded-xl shadow-md p-8 text-center">

                <h2 class="text-lg font-semibold text-gray-500">
                    Saved Careers
                </h2>

                <p
                    id="saved-careers-count"
                    class="text-5xl font-bold text-green-600 mt-4">

                    0

                </p>

            </div>

            <div class="bg-white rounded-xl shadow-md p-8 text-center">

                <h2 class="text-lg font-semibold text-gray-500">
                    Saved Opportunities
                </h2>

                <p
                    id="saved-opportunities-count"
                    class="text-5xl font-bold text-blue-600 mt-4">

                    0

                </p>

            </div>

        </div>

        <div class="mt-16 bg-white rounded-xl shadow-md p-8">

            <div class="flex justify-between items-center mb-6">

                <h2 class="text-3xl font-bold text-gray-800">

                    Registered Users

                </h2>

            </div>

            <div
                id="users-list"
                class="space-y-4">

            </div>

        </div>

    </div>

</section>
    <footer class="bg-gray-900 text-white py-8">
        <div class="text-center">
            <h2 class="text-2xl font-bold">ACCESS</h2>
            <p class="mt-3 text-gray-400">Helping students make informed career decisions.</p>
            <p class="mt-5 text-gray-500">© 2026 Access. All rights reserved.</p>
        </div>
</footer>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>

</body>
</html>

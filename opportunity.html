<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <Header>
        <nav class="fixed top-0 w-full bg-gray-200 shadow-md text-gray-800 transition duration-300 hover:scale-105">
            <div class="flex justify-between items-center p-10">
                <a href="index.html"class="text-3xl text-indigo-60 font-bold transition duration-300 hover:scale-102">ACCESS</a>
                <div class="flex items-center gap-6 text-xl">
                    <a href="careers.html" class=" font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Careers</a>
                    <a href="quiz.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Quiz</a>
                    <a href="dashboard.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Dashboard</a>
                    <a href="dashboard.html" class="font-bold  transition duration-300 hover:text-gray-400 hover:scale-120">Opportunities</a>
                    
                    
                    <a href="login.html" class="text-2xl hover:scale-120 transition duration-200">👤</a>
                </div>
            </div>
        </nav>

    </Header>
    <main>

<section class="pt-36 pb-20 px-8">
    <div class="max-w-7xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold text-gray-800">Opportunity Board</h1>
            <p class="text-lg text-gray-600 mt-4">Discover internships and job-shadowing opportunities</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-6 flex flex-col md:flex-row gap-5">
            <input
                id="search-input"
                type="text"
                placeholder="Search opportunities..."
                class="flex-1 border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-600">

            <select
                id="category-filter"
                class="border border-gray-300 rounded-lg px-4 py-3">

                <option value="All">All Categories</option>
                <option value="Technology">Technology</option>
                <option value="Medicine">Medicine</option>
                <option value="Business">Business</option>
                <option value="Engineering">Engineering</option>
                <option value="Arts">Arts</option>

            </select>

        </div>

        <div id="opportunity-list"class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12">
        </div>
    </div>
</section>
<div id="opportunity-modal"class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-11/12 max-w-xl p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 id="modal-title" class="text-3xl font-bold text-gray-800"></h2>
            <button id="close-modal"class="text-3xl font-bold hover:text-red-600">&times;</button>
        </div>
        <div class="space-y-5">
            <div>
                <h3 class="font-semibold text-lg">Company</h3>
                <p id="modal-company" class="text-gray-600"></p>
            </div>
            <div>
                <h3 class="font-semibold text-lg">Location</h3>
                <p id="modal-location" class="text-gray-600"></p>
            </div>

            <div>
                <h3 class="font-semibold text-lg">Category</h3>
                <p id="modal-category" class="text-gray-600"></p>
            </div>

            <div>
                <h3 class="font-semibold text-lg">Type</h3>
                <p id="modal-type" class="text-gray-600"></p>
            </div>

            <div>
                <h3 class="font-semibold text-lg">Description</h3>
                <p id="modal-description" class="text-gray-600"></p>
            </div>
        </div>
    </div>
</div>
</main>
   <footer class="bg-gray-900 text-white py-8">
        <div class="text-center">
            <h2 class="text-2xl font-bold">ACCESS</h2>
            <p class="mt-3 text-gray-400">Helping students make informed career decisions.</p>
            <p class="mt-5 text-gray-500">© 2026 Access. All rights reserved.</p>
        </div>
</footer>

<script src="js/opportunities.js"></script>

</body>
</html>
